name: Dev Alpha Release

on:
  push:
    branches:
      - dev
    paths-ignore:
      - 'package.json'
      - 'dist/**'
      - 'configs/**'

jobs:
  alpha-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Update Version
        id: versioning
        run: |
          VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const version = pkg.version;
            let nextVersion;
            if (version.includes('-alpha.')) {
              const parts = version.split('-alpha.');
              nextVersion = \`\${parts[0]}-alpha.\${parseInt(parts[1]) + 1}\`;
            } else {
              const semver = version.split('.');
              nextVersion = \`\${semver[0]}.\${semver[1]}.\${parseInt(semver[2]) + 1}-alpha.1\`;
            }
            pkg.version = nextVersion;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(nextVersion);
          ")
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update api_ver in connectorPrototype
        run: |
          # The file path is relative to the checkout directory in the runner
          sed -i "s/api_ver: \".*\"/api_ver: \"v${{ steps.versioning.outputs.NEW_VERSION }}\"/" esm/src/components/connectorPrototype.js

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json dist/msd_module.bundle.js
          git commit -m "chore: bump version to ${{ steps.versioning.outputs.NEW_VERSION }} [skip ci]"
          git tag v${{ steps.versioning.outputs.NEW_VERSION }}
          git push origin dev --tags

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msd_module.bundle-${{ steps.versioning.outputs.NEW_VERSION }}
          path: dist/msd_module.bundle.js

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Upload to GCS'
        run: |
          gcloud storage cp dist/msd_module.bundle.js gs://${{ secrets.GCP_BUCKET }}/msd_module.bundle.js --predefined-acl=publicRead
